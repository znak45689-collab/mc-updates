<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Простой Звонок</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0a0a0a; color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        #shader-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            transition: transform 0.1s ease-out;
        }
        
        #header { padding: 15px; background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(10px); text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); animation: slideDown 0.6s ease-out; }
        
        #videos { flex: 1; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 20px; flex-direction: row; }
        video { width: 45%; max-width: 600px; border-radius: 15px; background: rgba(40, 40, 40, 0.8); box-shadow: 0 10px 40px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); animation: scaleIn 0.5s ease-out; transition: transform 0.3s ease; }
        video:hover { transform: scale(1.02); }
        
        #controls { padding: 20px; background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; border-top: 1px solid rgba(255,255,255,0.1); animation: slideUp 0.6s ease-out; }
        button { padding: 12px 20px; border: none; border-radius: 25px; cursor: pointer; font-size: 14px; transition: all 0.3s ease; font-weight: 500; backdrop-filter: blur(5px); animation: popIn 0.4s ease-out; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        button:active { transform: scale(0.95); }
        .btn-on { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-off { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); color: white; }
        
        #chat { height: 180px; background: rgba(30, 30, 30, 0.8); backdrop-filter: blur(10px); display: flex; flex-direction: column; border-top: 1px solid rgba(255,255,255,0.1); animation: slideUp 0.6s ease-out 0.2s backwards; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; }
        #messages div { margin: 5px 0; padding: 10px 15px; background: rgba(50, 50, 50, 0.6); border-radius: 20px; display: inline-block; max-width: 70%; animation: messageSlide 0.3s ease-out; }
        #messages .self { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin-left: auto; }
        #input-area { display: flex; padding: 15px; gap: 10px; }
        #input-area input { flex: 1; padding: 12px 20px; border: none; border-radius: 25px; background: rgba(50, 50, 50, 0.6); color: white; outline: none; transition: all 0.3s ease; font-size: 14px; }
        #input-area input:focus { background: rgba(70, 70, 70, 0.8); box-shadow: 0 0 20px rgba(102, 126, 234, 0.3); }
        #input-area input::placeholder { color: #888; }
        #input-area button { padding: 12px 25px; border-radius: 25px; }
        
        #status { text-align: center; padding: 10px; color: rgba(255,255,255,0.6); font-size: 14px; animation: pulse 2s infinite; }
        
        h1 { font-weight: 300; letter-spacing: 2px; animation: fadeIn 0.8s ease-out; font-size: 24px; }
        
        @keyframes slideDown {
            from { transform: translateY(-100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        @keyframes scaleIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        
        @keyframes popIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
        
        @keyframes messageSlide {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.3); }
            50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.6); }
        }
        
        @media (max-width: 768px) {
            #videos { flex-direction: column; padding: 10px; }
            video { width: 90%; max-width: 100%; }
            #controls { padding: 15px 10px; gap: 8px; }
            button { padding: 10px 15px; font-size: 12px; }
            #chat { height: 150px; }
            #messages { padding: 10px; }
            #messages div { padding: 8px 12px; font-size: 14px; }
            #input-area { padding: 10px; }
            #input-area input { padding: 10px 15px; font-size: 14px; }
            #input-area button { padding: 10px 20px; }
            h1 { font-size: 20px; }
            #status { font-size: 12px; }
        }
        
        @media (max-width: 480px) {
            #header { padding: 10px; }
            h1 { font-size: 18px; }
            button { padding: 8px 12px; font-size: 11px; }
            #controls { gap: 6px; }
            #chat { height: 120px; }
            #messages div { font-size: 13px; }
        }
    </style>
</head>
<body>
    <canvas id="shader-canvas"></canvas>
    
    <div id="header">
        <h1>📞 Простой Звонок</h1>
        <div id="status">Подключение...</div>
    </div>
    
    <div id="videos">
        <video id="local-video" autoplay muted playsinline></video>
        <video id="remote-video" autoplay playsinline></video>
    </div>
    
    <div id="controls">
        <button id="btn-camera" class="btn-on" onclick="toggleCamera()">📷</button>
        <button id="btn-screen" class="btn-off" onclick="toggleScreen()">🖥️</button>
        <button id="btn-mic" class="btn-on" onclick="toggleMic()">🎤</button>
        <button id="btn-speaker" class="btn-on" onclick="toggleSpeaker()">🔊</button>
    </div>
    
    <div id="chat">
        <div id="messages"></div>
        <div id="input-area">
            <input type="text" id="message-input" placeholder="Написать сообщение..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button class="btn-on" onclick="sendMessage()">Отправить</button>
        </div>
    </div>

    <script>
        const ROOM_ID = 'simple-call-room';
        let peer;
        let localStream;
        let call;
        let conn;
        let cameraEnabled = true;
        let micEnabled = true;
        let speakerEnabled = true;
        let isHost = false;
        let screenMode = false;
        let screenStream = null;

        // Инициализация
        async function init() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('local-video').srcObject = localStream;
                
                // Пробуем подключиться как хост комнаты
                peer = new Peer(ROOM_ID);
                
                peer.on('open', (id) => {
                    isHost = true;
                    document.getElementById('status').textContent = 'Ожидание звонка...';
                    console.log('Host mode, room ID:', id);
                });
                
                peer.on('call', (incomingCall) => {
                    incomingCall.answer(localStream);
                    call = incomingCall;
                    call.on('stream', (remoteStream) => {
                        document.getElementById('remote-video').srcObject = remoteStream;
                        document.getElementById('status').textContent = 'Соединено!';
                    });
                });
                
                peer.on('connection', (connection) => {
                    conn = connection;
                    conn.on('data', (data) => {
                        addMessage(data, false);
                    });
                });
                
                peer.on('error', (err) => {
                    if (err.type === 'peer-unavailable') {
                        // Комната занята, подключаемся как клиент
                        connectAsClient();
                    } else {
                        console.error('Peer error:', err);
                    }
                });
                
            } catch (err) {
                alert('Ошибка доступа к камере/микрофону: ' + err.message);
            }
        }

        function connectAsClient() {
            peer.destroy();
            
            // Генерируем уникальный ID для клиента
            const clientId = ROOM_ID + '-' + Math.random().toString(36).substr(2, 9);
            peer = new Peer(clientId);
            
            peer.on('open', (id) => {
                isHost = false;
                document.getElementById('status').textContent = 'Подключение к комнате...';
                
                // Подключаемся к хосту
                call = peer.call(ROOM_ID, localStream);
                call.on('stream', (remoteStream) => {
                    document.getElementById('remote-video').srcObject = remoteStream;
                    document.getElementById('status').textContent = 'Соединено!';
                });
                
                conn = peer.connect(ROOM_ID);
                conn.on('data', (data) => {
                    addMessage(data, false);
                });
                
                conn.on('open', () => {
                    document.getElementById('status').textContent = 'Соединено!';
                });
            });
            
            peer.on('error', (err) => {
                console.error('Client error:', err);
                document.getElementById('status').textContent = 'Ошибка подключения';
            });
        }

        function toggleCamera() {
            cameraEnabled = !cameraEnabled;
            localStream.getVideoTracks().forEach(track => track.enabled = cameraEnabled);
            document.getElementById('btn-camera').className = cameraEnabled ? 'btn-on' : 'btn-off';
        }

        async function toggleScreen() {
            if (!screenMode) {
                try {
                    screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    
                    // Заменяем видеотрек в локальном стриме
                    const videoTrack = screenStream.getVideoTracks()[0];
                    const sender = call && call.peerConnection ? 
                        call.peerConnection.getSenders().find(s => s.track.kind === 'video') : null;
                    
                    if (sender) {
                        sender.replaceTrack(videoTrack);
                    }
                    
                    document.getElementById('local-video').srcObject = screenStream;
                    screenMode = true;
                    
                    document.getElementById('btn-screen').className = 'btn-on';
                    document.getElementById('btn-camera').className = 'btn-off';
                    
                    // Когда пользователь останавливает демонстрацию
                    videoTrack.onended = () => {
                        toggleScreen();
                    };
                    
                } catch (err) {
                    console.error('Ошибка демонстрации экрана:', err);
                }
            } else {
                // Возвращаемся на камеру
                if (screenStream) {
                    screenStream.getTracks().forEach(track => track.stop());
                }
                
                try {
                    const cameraStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                    const videoTrack = cameraStream.getVideoTracks()[0];
                    const audioTrack = cameraStream.getAudioTracks()[0];
                    
                    const sender = call && call.peerConnection ? 
                        call.peerConnection.getSenders().find(s => s.track.kind === 'video') : null;
                    
                    if (sender) {
                        sender.replaceTrack(videoTrack);
                    }
                    
                    document.getElementById('local-video').srcObject = cameraStream;
                    
                    // Обновляем локальный стрим
                    localStream.getVideoTracks().forEach(track => track.stop());
                    localStream.getAudioTracks().forEach(track => track.stop());
                    localStream = cameraStream;
                    
                    screenMode = false;
                    screenStream = null;
                    
                    document.getElementById('btn-screen').className = 'btn-off';
                    document.getElementById('btn-camera').className = 'btn-on';
                    
                } catch (err) {
                    console.error('Ошибка возврата к камере:', err);
                }
            }
        }

        function toggleMic() {
            micEnabled = !micEnabled;
            
            // Выключаем/включаем аудио трек в локальном стриме
            localStream.getAudioTracks().forEach(track => {
                track.enabled = micEnabled;
            });
            
            // Если есть активное соединение, обновляем аудио трек
            if (call && call.peerConnection) {
                const audioSender = call.peerConnection.getSenders().find(s => s.track && s.track.kind === 'audio');
                if (audioSender && localStream.getAudioTracks().length > 0) {
                    audioSender.track.enabled = micEnabled;
                }
            }
            
            document.getElementById('btn-mic').className = micEnabled ? 'btn-on' : 'btn-off';
        }

        function toggleSpeaker() {
            speakerEnabled = !speakerEnabled;
            document.getElementById('remote-video').muted = !speakerEnabled;
            document.getElementById('btn-speaker').className = speakerEnabled ? 'btn-on' : 'btn-off';
        }

        function sendMessage() {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, true);
            
            if (conn && conn.open) {
                conn.send(message);
            }
            
            input.value = '';
        }

        function addMessage(text, isSelf) {
            const messagesDiv = document.getElementById('messages');
            const msgDiv = document.createElement('div');
            msgDiv.textContent = (isSelf ? 'Ты: ' : 'Друг: ') + text;
            msgDiv.className = isSelf ? 'self' : '';
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        init();

        // Шейдерный фон
        const canvas = document.getElementById('shader-canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        let time = 0;
        
        function drawShader() {
            time += 0.005;
            
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            
            // Плавающие цвета
            const r1 = Math.sin(time) * 30 + 20;
            const g1 = Math.sin(time + 2) * 30 + 10;
            const b1 = Math.sin(time + 4) * 40 + 30;
            
            const r2 = Math.sin(time + 1) * 20 + 40;
            const g2 = Math.sin(time + 3) * 20 + 20;
            const b2 = Math.sin(time + 5) * 30 + 50;
            
            const r3 = Math.sin(time + 0.5) * 25 + 15;
            const g3 = Math.sin(time + 2.5) * 25 + 5;
            const b3 = Math.sin(time + 4.5) * 35 + 25;
            
            gradient.addColorStop(0, `rgb(${r1}, ${g1}, ${b1})`);
            gradient.addColorStop(0.5, `rgb(${r2}, ${g2}, ${b2})`);
            gradient.addColorStop(1, `rgb(${r3}, ${g3}, ${b3})`);
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Добавляем плавающие круги
            for (let i = 0; i < 5; i++) {
                const x = canvas.width / 2 + Math.sin(time + i * 1.5) * (canvas.width * 0.3);
                const y = canvas.height / 2 + Math.cos(time + i * 2) * (canvas.height * 0.3);
                const radius = 200 + Math.sin(time + i) * 100;
                
                const circleGradient = ctx.createRadialGradient(x, y, 0, x, y, radius);
                circleGradient.addColorStop(0, `rgba(${100 + i * 20}, ${50 + i * 10}, ${150 + i * 20}, 0.1)`);
                circleGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
                
                ctx.fillStyle = circleGradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            requestAnimationFrame(drawShader);
        }
        
        drawShader();

        // Параллакс эффект за курсором
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        
        document.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 30;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 30;
        });
        
        // Для тач-устройств
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 0) {
                mouseX = (e.touches[0].clientX / window.innerWidth - 0.5) * 15;
                mouseY = (e.touches[0].clientY / window.innerHeight - 0.5) * 15;
            }
        });
        
        function updateParallax() {
            targetX += (mouseX - targetX) * 0.05;
            targetY += (mouseY - targetY) * 0.05;
            
            canvas.style.transform = `translate(${targetX}px, ${targetY}px) scale(1.1)`;
            
            requestAnimationFrame(updateParallax);
        }
        
        updateParallax();
    </script>
</body>
</html>
